<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" class="world-svg-logo">
  <style>
    .draw-path {
      stroke: var(--accent, #f03e3e);
      stroke-width: 2;
      fill: none;
      stroke-dasharray: 300;
      stroke-dashoffset: 300;
      animation: logo-draw 3s ease-in-out forwards infinite alternate;
    }
    .inner-circle {
      stroke: var(--accent, #f03e3e);
      stroke-width: 1.5;
      fill: none;
      transform-origin: 50px 50px;
      animation: logo-spin 10s linear infinite;
    }
    .pulse-glow {
      fill: var(--accent, #f03e3e);
      filter: drop-shadow(0 0 6px var(--accent, #f03e3e));
      animation: logo-pulse 2s ease-in-out infinite alternate;
    }
    @keyframes logo-draw {
      0% { stroke-dashoffset: 300; }
      100% { stroke-dashoffset: 0; }
    }
    @keyframes logo-spin {
      100% { transform: rotate(360deg); }
    }
    @keyframes logo-pulse {
      0% { opacity: 0.3; transform: scale(0.9); transform-origin: 50px 50px; }
      100% { opacity: 1; transform: scale(1.1); transform-origin: 50px 50px; }
    }
  </style>
  <path class="draw-path" d="M 50,10 L 85,30 L 85,70 L 50,90 L 15,70 L 15,30 Z" />
  <circle class="inner-circle" cx="50" cy="50" r="25" stroke-dasharray="8, 4" />
  <circle class="pulse-glow" cx="50" cy="50" r="8" />
  <line x1="50" y1="10" x2="50" y2="25" stroke="var(--accent, #f03e3e)" stroke-width="1.5" />
  <line x1="85" y1="70" x2="68" y2="60" stroke="var(--accent, #f03e3e)" stroke-width="1.5" />
  <line x1="15" y1="70" x2="32" y2="60" stroke="var(--accent, #f03e3e)" stroke-width="1.5" />
</svg>
