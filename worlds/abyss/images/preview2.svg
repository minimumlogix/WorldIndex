<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600" width="100%" height="100%">
  <rect width="100%" height="100%" fill="#07090e" />
  <!-- Spherical engine core -->
  <circle cx="200" cy="300" r="120" fill="none" stroke="#f03e3e" stroke-width="2" stroke-opacity="0.1" />
  <circle cx="200" cy="300" r="90" fill="none" stroke="#f03e3e" stroke-dasharray="5,5" stroke-width="1.5" stroke-opacity="0.15" />
  <!-- Radiant glowing beams -->
  <g stroke="#f03e3e" stroke-width="1" stroke-opacity="0.2">
    <line x1="200" y1="300" x2="200" y2="100" />
    <line x1="200" y1="300" x2="200" y2="500" />
    <line x1="200" y1="300" x2="400" y2="300" />
    <line x1="200" y1="300" x2="0" y2="300" />
    <line x1="200" y1="300" x2="50" y2="150" />
    <line x1="200" y1="300" x2="350" y2="150" />
    <line x1="200" y1="300" x2="50" y2="450" />
    <line x1="200" y1="300" x2="350" y2="450" />
  </g>
  <!-- Glowing Center sphere -->
  <circle cx="200" cy="300" r="25" fill="#f03e3e" filter="drop-shadow(0 0 8px #f03e3e)" />
  <circle cx="200" cy="300" r="10" fill="#ffffff" />
  <text x="200" y="540" fill="#f03e3e" font-family="monospace" font-size="12" text-anchor="middle" letter-spacing="2">ABYSS: LAYER_09 // POWER_CORE</text>
</svg>
