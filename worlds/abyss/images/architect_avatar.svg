<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <radialGradient id="avatar-grad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f03e3e" />
      <stop offset="60%" stop-color="#1f2a38" />
      <stop offset="100%" stop-color="#0b0f16" />
    </radialGradient>
  </defs>
  <!-- Background Circle -->
  <circle cx="50" cy="50" r="48" fill="url(#avatar-grad)" stroke="#f03e3e" stroke-opacity="0.3" stroke-width="2" />
  <!-- Rings -->
  <circle cx="50" cy="50" r="30" fill="none" stroke="#f03e3e" stroke-width="1.5" stroke-dasharray="10, 5" />
  <circle cx="50" cy="50" r="20" fill="none" stroke="#ffffff" stroke-opacity="0.3" stroke-width="1" />
  <!-- Glowing Center dot -->
  <circle cx="50" cy="50" r="8" fill="#ffffff" filter="drop-shadow(0 0 4px #f03e3e)" />
  <!-- Tech lines intersecting -->
  <line x1="50" y1="10" x2="50" y2="90" stroke="#f03e3e" stroke-opacity="0.2" stroke-width="1" />
  <line x1="10" y1="50" x2="90" y2="50" stroke="#f03e3e" stroke-opacity="0.2" stroke-width="1" />
</svg>
