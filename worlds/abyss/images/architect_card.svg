<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <defs>
    <linearGradient id="abyss-card" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#121820" />
      <stop offset="100%" stop-color="#07090e" />
    </linearGradient>
    <radialGradient id="card-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f03e3e" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#f03e3e" stop-opacity="0" />
    </radialGradient>
  </defs>
  <!-- Base Background -->
  <rect width="100%" height="100%" fill="url(#abyss-card)" />
  <!-- Center Glow -->
  <circle cx="200" cy="150" r="180" fill="url(#card-glow)" />
  <!-- Tech Grid Lines -->
  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="0" y1="50" x2="400" y2="50" />
    <line x1="0" y1="100" x2="400" y2="100" />
    <line x1="0" y1="150" x2="400" y2="150" />
    <line x1="0" y1="200" x2="400" y2="200" />
    <line x1="0" y1="250" x2="400" y2="250" />
    <line x1="80" y1="0" x2="80" y2="300" />
    <line x1="160" y1="0" x2="160" y2="300" />
    <line x1="240" y1="0" x2="240" y2="300" />
    <line x1="320" y1="0" x2="320" y2="300" />
  </g>
  <!-- Architectural blueprint circles -->
  <circle cx="200" cy="150" r="80" fill="none" stroke="#f03e3e" stroke-opacity="0.15" stroke-width="1.5" />
  <circle cx="200" cy="150" r="110" fill="none" stroke="#f03e3e" stroke-opacity="0.08" stroke-width="1" stroke-dasharray="5,5" />
  <!-- Hexagon Core shape -->
  <polygon points="200,100 243,125 243,175 200,200 157,175 157,125" fill="none" stroke="#f03e3e" stroke-opacity="0.3" stroke-width="2" />
  <!-- Abstract Details -->
  <text x="20" y="35" fill="#f03e3e" font-family="monospace" font-size="8" letter-spacing="1">SECTOR: ABYSS // CORE_DESIGNER</text>
  <text x="380" y="280" fill="#f03e3e" fill-opacity="0.3" font-family="monospace" font-size="8" text-anchor="end">V.99-SYS</text>
</svg>
