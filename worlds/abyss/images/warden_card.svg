<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <defs>
    <linearGradient id="warden-card" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#151e2b" />
      <stop offset="100%" stop-color="#07090e" />
    </linearGradient>
    <radialGradient id="shield-glow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#f03e3e" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#000000" stop-opacity="0" />
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#warden-card)" />
  <circle cx="200" cy="150" r="180" fill="url(#shield-glow)" />
  <!-- Heavy industrial frames/borders -->
  <rect x="20" y="20" width="360" height="260" fill="none" stroke="#f03e3e" stroke-opacity="0.1" stroke-width="2" />
  <path d="M 40,40 L 360,40 L 360,260 L 40,260 Z" fill="none" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1" />
  
  <!-- Central heavy shield motif -->
  <g transform="translate(200, 150) scale(1.5)" fill="none" stroke="#f03e3e" stroke-opacity="0.3" stroke-width="2">
    <!-- Outer Shield shield-outline -->
    <path d="M -30,-40 L 30,-40 L 40,-10 L 0,40 L -40,-10 Z" />
    <!-- Inner Core shield -->
    <path d="M -15,-25 L 15,-25 L 20,-5 L 0,25 L -20,-5 Z" fill="#f03e3e" fill-opacity="0.1" />
    <!-- Core core-dot -->
    <circle cx="0" cy="-5" r="4" fill="#ffffff" filter="drop-shadow(0 0 3px #f03e3e)" />
  </g>
  
  <!-- Corner details -->
  <line x1="20" y1="20" x2="40" y2="40" stroke="#f03e3e" stroke-opacity="0.4" stroke-width="2" />
  <line x1="380" y1="20" x2="360" y2="40" stroke="#f03e3e" stroke-opacity="0.4" stroke-width="2" />
  <line x1="20" y1="280" x2="40" y2="260" stroke="#f03e3e" stroke-opacity="0.4" stroke-width="2" />
  <line x1="380" y1="280" x2="360" y2="260" stroke="#f03e3e" stroke-opacity="0.4" stroke-width="2" />
  
  <text x="30" y="270" fill="#f03e3e" font-family="monospace" font-size="8" letter-spacing="1">VAULT_WARDEN // PROTOCOL_ACTIVE</text>
</svg>
