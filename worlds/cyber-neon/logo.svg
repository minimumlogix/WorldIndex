<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" class="world-svg-logo">
  <style>
    .cyber-triangle {
      stroke: var(--accent, #ff007f);
      stroke-width: 2.5;
      fill: none;
      stroke-dasharray: 240;
      stroke-dashoffset: 240;
      animation: triangle-draw 2.5s ease-out infinite alternate;
    }
    .neon-glow {
      stroke: #00ffff;
      stroke-width: 1.5;
      fill: none;
      filter: drop-shadow(0 0 5px #00ffff);
      animation: pulse-glow 1.5s ease-in-out infinite alternate;
    }
    @keyframes triangle-draw {
      0% { stroke-dashoffset: 240; }
      100% { stroke-dashoffset: 0; }
    }
    @keyframes pulse-glow {
      0% { opacity: 0.4; }
      100% { opacity: 1; }
    }
  </style>
  <polygon class="cyber-triangle" points="50,15 90,80 10,80" />
  <line class="neon-glow" x1="10" y1="80" x2="90" y2="80" />
  <line class="neon-glow" x1="50" y1="15" x2="50" y2="80" />
  <circle cx="50" cy="50" r="6" fill="#00ffff" />
</svg>
