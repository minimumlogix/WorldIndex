<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <defs>
    <linearGradient id="corp-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#120917" />
      <stop offset="100%" stop-color="#050a12" />
    </linearGradient>
    <radialGradient id="target-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00ffff" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#ff007f" stop-opacity="0" />
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#corp-grad)" />
  <circle cx="200" cy="150" r="150" fill="url(#target-glow)" />

  <!-- Grid lines -->
  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="0" y1="150" x2="400" y2="150" />
    <line x1="200" y1="0" x2="200" y2="300" />
  </g>

  <!-- Tactical Target scope design -->
  <circle cx="200" cy="150" r="90" fill="none" stroke="#00ffff" stroke-opacity="0.3" stroke-width="1.5" stroke-dasharray="15,10" />
  <circle cx="200" cy="150" r="50" fill="none" stroke="#00ffff" stroke-opacity="0.5" stroke-width="2" />
  <circle cx="200" cy="150" r="10" fill="none" stroke="#ff007f" stroke-opacity="0.6" stroke-width="2" />
  <circle cx="200" cy="150" r="2" fill="#ffffff" />
  
  <!-- Crosshair ticks -->
  <path d="M 200,80 L 200,95 M 200,205 L 200,220 M 130,150 L 145,150 M 255,150 L 270,150" stroke="#00ffff" stroke-width="2" />

  <!-- Code details -->
  <text x="25" y="35" fill="#00ffff" font-family="monospace" font-size="8" letter-spacing="1">MEGACORP // SEC_OFFICER_RECON</text>
  <text x="375" y="275" fill="#ff007f" font-family="monospace" font-size="8" text-anchor="end">SYS_STATUS: ACTIVE</text>
</svg>
