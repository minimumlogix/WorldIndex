<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <defs>
    <linearGradient id="neon-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#120917" />
      <stop offset="100%" stop-color="#020005" />
    </linearGradient>
    <radialGradient id="hacker-glow" cx="80%" cy="20%" r="60%">
      <stop offset="0%" stop-color="#ff007f" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#00ffff" stop-opacity="0" />
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#neon-grad)" />
  <rect width="100%" height="100%" fill="url(#hacker-glow)" />
  
  <!-- Cyber grids -->
  <g stroke="#00ffff" stroke-opacity="0.08" stroke-width="1">
    <line x1="0" y1="20" x2="400" y2="20" />
    <line x1="0" y1="60" x2="400" y2="60" />
    <line x1="0" y1="120" x2="400" y2="120" />
    <line x1="0" y1="180" x2="400" y2="180" />
    <line x1="0" y1="240" x2="400" y2="240" />
    <line x1="50" y1="0" x2="50" y2="300" />
    <line x1="120" y1="0" x2="120" y2="300" />
    <line x1="220" y1="0" x2="220" y2="300" />
    <line x1="320" y1="0" x2="320" y2="300" />
  </g>

  <!-- Digital Code stream vertical lines -->
  <g fill="#ff007f" fill-opacity="0.3" font-family="monospace" font-size="8">
    <text x="30" y="50">01</text>
    <text x="30" y="70">10</text>
    <text x="30" y="90">11</text>
    <text x="30" y="110">00</text>
    <text x="350" y="150">10</text>
    <text x="350" y="170">01</text>
    <text x="350" y="190">11</text>
    <text x="350" y="210">10</text>
  </g>
  
  <!-- Central binary mesh -->
  <circle cx="200" cy="150" r="70" fill="none" stroke="#00ffff" stroke-opacity="0.2" stroke-width="1" />
  <circle cx="200" cy="150" r="50" fill="none" stroke="#ff007f" stroke-opacity="0.2" stroke-width="1.5" stroke-dasharray="8,4" />
  <circle cx="200" cy="150" r="20" fill="none" stroke="#00ffff" stroke-opacity="0.4" stroke-width="2" />
  
  <text x="20" y="270" fill="#00ffff" font-family="monospace" font-size="8" letter-spacing="1">NETRUNNER // PORT_INTRUSION: OK</text>
</svg>
