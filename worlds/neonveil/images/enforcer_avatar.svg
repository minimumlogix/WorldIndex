<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <radialGradient id="enforcer-av" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00ffff" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#120917" />
    </radialGradient>
  </defs>
  <!-- Background -->
  <circle cx="50" cy="50" r="48" fill="url(#enforcer-av)" stroke="#00ffff" stroke-width="2" />
  <!-- Helmet layout -->
  <rect x="30" y="30" width="40" height="40" rx="8" fill="#120917" stroke="#ff007f" stroke-width="2" />
  <!-- Visor bar -->
  <polygon points="32,45 68,45 64,55 36,55" fill="#00ffff" filter="drop-shadow(0 0 4px #00ffff)" />
  <circle cx="50" cy="50" r="3" fill="#ffffff" />
  <!-- Antenna side -->
  <line x1="70" y1="40" x2="80" y2="25" stroke="#ff007f" stroke-width="2" />
  <circle cx="80" cy="25" r="2" fill="#ff007f" />
</svg>
