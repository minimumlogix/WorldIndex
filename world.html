<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>World Profile - World Nexus</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700;800&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/responsive.css">
  
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<body class="dark-theme">
  <div id="global-loader" class="global-loader">
    <div class="loader-spinner"></div>
  </div>

  <header id="main-header" class="main-header">
    <div class="header-container">
      <a href="index.html" class="logo-link" id="logo-link">
        <svg class="header-compass-logo spin-hover" viewBox="0 0 100 100" width="34" height="34" fill="none" stroke="url(#gold-grad)" stroke-width="1.5" style="margin-right: 12px; filter: drop-shadow(0 0 4px rgba(212,175,55,0.4));">
          <defs>
            <linearGradient id="gold-grad" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%" stop-color="#fef08a"/>
              <stop offset="50%" stop-color="#eab308"/>
              <stop offset="100%" stop-color="#854d0e"/>
            </linearGradient>
          </defs>
          <circle cx="50" cy="50" r="42" stroke="url(#gold-grad)" stroke-opacity="0.4"/>
          <circle cx="50" cy="50" r="28" stroke="url(#gold-grad)" stroke-opacity="0.3" stroke-dasharray="4,3"/>
          <line x1="50" y1="8" x2="50" y2="92" stroke="url(#gold-grad)" stroke-opacity="0.5"/>
          <line x1="8" y1="50" x2="92" y2="50" stroke="url(#gold-grad)" stroke-opacity="0.5"/>
          <polygon points="50,15 54,46 85,50 54,54 50,85 46,54 15,50 46,46" fill="url(#gold-grad)"/>
        </svg>
        <span class="logo-text">W_NEXUS</span>
      </a>
      
      <div class="header-stats" aria-label="Global Statistics">
        <span class="stat-item"><strong id="stat-worlds-count">-</strong> Worlds</span>
        <span class="stat-divider">|</span>
        <span class="stat-item"><strong id="stat-bots-count">-</strong> Bots</span>
      </div>

      <div class="header-search-container" id="header-search-wrapper" style="display:none;">
        <input type="text" id="global-search-input" placeholder="Search worlds & bots..." aria-label="Search">
      </div>

      <div class="header-actions">
        <a href="index.html" class="back-home-link" style="margin-right: 15px; color: var(--text-muted); text-decoration: none; font-size: 0.9rem;">← Back Home</a>
        <button id="theme-toggle" class="theme-toggle-btn" aria-label="Toggle Theme" title="Toggle Light/Dark Theme">
          <svg class="sun-icon" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.22" x2="5.64" y2="17.78"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
          <svg class="moon-icon" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
        <button id="mobile-menu-toggle" class="mobile-menu-btn" aria-label="Open Navigation Menu">
          <span></span><span></span><span></span>
        </button>
      </div>
    </div>
  </header>

  <nav id="mobile-nav" class="mobile-nav" aria-label="Mobile Navigation">
    <div class="mobile-nav-content">
      <ul class="mobile-nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="#" id="mobile-nav-worlds">All Worlds</a></li>
        <li><a href="#" id="mobile-nav-about">About Nexus</a></li>
      </ul>
    </div>
  </nav>

  <main id="app-root">
    <!-- Dynamic page content will render here -->
  </main>

    <div class="constellation-bg"></div>
    <div class="footer-container" style="position: relative; z-index: 2;">
      <div class="footer-brand">
        <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 8px;">
          <svg class="footer-compass-logo" viewBox="0 0 100 100" width="30" height="30" fill="none" stroke="var(--accent-gold)" stroke-width="1.5">
            <circle cx="50" cy="50" r="42" stroke="var(--accent-gold)" stroke-opacity="0.4"/>
            <circle cx="50" cy="50" r="28" stroke="var(--accent-gold)" stroke-opacity="0.3" stroke-dasharray="4,3"/>
            <line x1="50" y1="8" x2="50" y2="92" stroke="var(--accent-gold)" stroke-opacity="0.5"/>
            <line x1="8" y1="50" x2="92" y2="50" stroke="var(--accent-gold)" stroke-opacity="0.5"/>
            <polygon points="50,15 54,46 85,50 54,54 50,85 46,54 15,50 46,46" fill="var(--accent-gold)"/>
          </svg>
          <span class="logo-text" style="font-family: var(--font-serif); font-size: 1.2rem; letter-spacing: 0.1em;">WORLD NEXUS</span>
        </div>
        <p>A data-driven index of fictional realities and their intelligent agents.</p>
      </div>
      <div class="footer-links">
        <h4 style="font-family: var(--font-serif); color: var(--accent-gold); font-size: 0.95rem; margin-bottom: 16px;">Navigation</h4>
        <ul>
          <li>
            <a href="index.html" style="display: inline-flex; align-items: center; gap: 8px;">
              <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
              Home
            </a>
          </li>
          <li>
            <a href="#" class="scroll-to-top" style="display: inline-flex; align-items: center; gap: 8px;">
              <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>
              Back to Top
            </a>
          </li>
        </ul>
      </div>
      <div class="footer-meta">
        <div class="social-icons" style="display: flex; gap: 12px; margin-bottom: 16px; justify-content: flex-end;">
          <a href="#" class="social-btn" aria-label="Discord">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8a3 3 0 0 0-3-3H5a3 3 0 0 0-3 3v8a3 3 0 0 0 3 3h10a3 3 0 0 0 3-3V8z"/><circle cx="8" cy="12" r="1.5"/><circle cx="12" cy="12" r="1.5"/></svg>
          </a>
          <a href="#" class="social-btn" aria-label="X">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4l11.733 16h4.267l-11.733 -16z M4 20l6.768 -6.768 M20 4l-6.768 6.768"/></svg>
          </a>
          <a href="#" class="social-btn" aria-label="Reddit">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="8" r="1"/></svg>
          </a>
          <a href="#" class="social-btn" aria-label="Nexus Core">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="8"/><circle cx="12" cy="12" r="4"/></svg>
          </a>
        </div>
        <p>&copy; 2026 World Nexus. Zero hardcoded entities. Accessible & performant.</p>
      </div>
    </div>
